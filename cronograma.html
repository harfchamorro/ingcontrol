<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma - IngControl</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f11;--surface:#1a1a1f;--surface2:#222228;--border:#2e2e38;
    --accent:#6ee7b7;--accent2:#818cf8;--text:#f1f1f3;--text2:#8888a0;
    --danger:#f87171;--warning:#fbbf24;--success:#4ade80;--radius:10px;
    --info-w:280px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
  .logo{font-size:15px;font-weight:600;color:var(--accent);}
  .logo span{color:var(--text2);font-weight:400;}
  .nav{display:flex;gap:8px;}
  .nav a{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:8px;transition:all .15s;}
  .nav a:hover{color:var(--text);background:var(--surface2);}
  .nav a.active{color:var(--accent);background:rgba(110,231,183,.1);}
  .container{max-width:1400px;margin:0 auto;padding:32px 24px;}
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .page-title{font-size:22px;font-weight:600;}
  .page-sub{font-size:14px;color:var(--text2);margin-top:2px;}
  .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  select.filter{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
  select.filter:focus{border-color:var(--accent2);}
  .btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.active-tab{background:rgba(129,140,248,.15);border-color:var(--accent2);color:var(--accent2);}
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .legend{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
  .legend-dot{width:12px;height:12px;border-radius:3px;}

  .gantt-outer{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .stats-mini{display:flex;gap:20px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;}
  .stat-mini-item{font-size:12px;color:var(--text2);}
  .stat-mini-item strong{color:var(--text);font-family:'DM Mono',monospace;}

  /* Two-column flex layout — left fixed, right scrollable */
  .gantt-layout{display:flex;overflow:hidden;}
  .gantt-left{flex:0 0 var(--info-w);width:var(--info-w);border-right:2px solid var(--border);overflow:hidden;background:var(--surface);}
  .gantt-right{flex:1;overflow-x:auto;}
  .gantt-right-inner{position:relative;}

  .gantt-left-header,.gantt-time-header{height:40px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .gantt-left-header{display:flex;align-items:center;padding:0 16px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
  .gantt-time-header{position:relative;}

  .gantt-col-label{position:absolute;top:0;height:40px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.03em;border-right:1px solid var(--border);padding:0 4px;text-align:center;overflow:hidden;}

  /* Project rows */
  .gantt-project-info{background:var(--surface2);border-bottom:1px solid var(--border);border-top:1px solid var(--border);padding:7px 12px 7px 16px;display:flex;align-items:center;gap:8px;}
  .gantt-project-bar-row{background:var(--surface2);border-bottom:1px solid var(--border);border-top:1px solid var(--border);position:relative;}

  /* Phase rows */
  .gantt-fase-info{border-bottom:1px solid rgba(46,46,56,.5);padding:5px 12px 5px 24px;display:flex;flex-direction:column;justify-content:center;min-height:36px;}
  .gantt-fase-bar-row{border-bottom:1px solid rgba(46,46,56,.5);position:relative;min-height:36px;}

  .fase-nombre{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fase-horas{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:1px;}
  .project-label{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .project-meta{font-size:10px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .badge-tipo{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:500;flex-shrink:0;}
  .badge-externo{background:rgba(129,140,248,.15);color:var(--accent2);}
  .badge-interno{background:rgba(110,231,183,.15);color:var(--accent);}
  .badge-desarrollo_producto{background:rgba(251,191,36,.15);color:var(--warning);}
  .badge-licitacion{background:rgba(248,113,113,.15);color:var(--danger);}
  .badge-edicion_planos{background:rgba(167,139,250,.15);color:#c4b5fd;}
  .badge-otros{background:rgba(136,136,160,.15);color:var(--text2);}
  .estado-badge{font-size:9px;padding:2px 6px;border-radius:10px;flex-shrink:0;}
  .estado-activo,.estado-en_curso{background:rgba(110,231,183,.15);color:var(--accent);}
  .estado-completado{background:rgba(74,222,128,.15);color:var(--success);}
  .estado-cancelado{background:rgba(248,113,113,.15);color:var(--danger);}
  .estado-pausado{background:rgba(251,191,36,.15);color:var(--warning);}
  .estado-cotizacion{background:rgba(129,140,248,.15);color:var(--accent2);}

  .gantt-bar{position:absolute;height:20px;top:8px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.95);white-space:nowrap;overflow:hidden;cursor:pointer;transition:filter .15s;min-width:4px;z-index:2;}
  .gantt-bar:hover{filter:brightness(1.15);}
  .gantt-bar-real{position:absolute;height:5px;top:16px;border-radius:3px;z-index:3;pointer-events:none;opacity:.85;}
  .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);opacity:.75;z-index:10;pointer-events:none;}
  .col-sep{position:absolute;top:0;bottom:0;width:1px;background:rgba(46,46,56,.35);z-index:1;}

  .loading-text{color:var(--text2);font-size:13px;text-align:center;padding:40px;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .tooltip{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text);z-index:1000;pointer-events:none;display:none;max-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .tooltip-title{font-weight:600;margin-bottom:6px;color:var(--accent);}
  .tooltip-row{display:flex;justify-content:space-between;gap:16px;color:var(--text2);margin-top:3px;}
  .tooltip-row span:last-child{color:var(--text);font-family:'DM Mono',monospace;}
  .pct-mini{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:6px;}
  .pct-mini-fill{height:100%;border-radius:2px;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text2);font-size:13px;}
</style>
</head>
<body>
<header>
  <div class="logo">Ing<span>Control</span> · <span>Cronograma</span></div>
  <nav class="nav">
    <a href="index.html">Ingenieros</a>
    <a href="proyectos.html">Proyectos</a>
    <a href="actividades.html">Actividades</a>
    <a href="registro.html">Registro</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="cronograma.html" class="active">Cronograma</a>
  </nav>
</header>

<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">Cronograma de proyectos</div>
      <div class="page-sub">Vista de fases y tiempos estimados por proyecto</div>
    </div>
    <div class="filters">
      <select class="filter" id="filtro-estado" onchange="renderGantt()">
        <option value="todos">Todos los estados</option>
      </select>
      <select class="filter" id="filtro-area" onchange="renderGantt()">
        <option value="todos">Todas las áreas</option>
      </select>
      <select class="filter" id="filtro-tipo" onchange="renderGantt()">
        <option value="todos">Todos los tipos</option>
        <option value="externo">Externo</option>
        <option value="interno">Interno</option>
        <option value="desarrollo_producto">Desarrollo de Producto</option>
        <option value="licitacion">Licitación</option>
        <option value="edicion_planos">Edición de Planos</option>
        <option value="otros">Otros</option>
      </select>
      <select class="filter" id="filtro-vista" onchange="renderGantt()">
        <option value="proyectos">Por proyectos</option>
        <option value="consolidado">Consolidado</option>
      </select>
      <select class="filter" id="filtro-escala" onchange="renderGantt()">
        <option value="meses" selected>Por meses</option>
        <option value="semanas">Por semanas</option>
      </select>
      <button class="btn" onclick="recargar()">↻ Actualizar</button>
    </div>
  </div>

  <div class="tabs">
    <button class="btn active-tab" id="tab-estimado" onclick="setTab('estimado')">📋 Estimado</button>
    <button class="btn" id="tab-capacidad" onclick="setTab('capacidad')">⚡ Por capacidad</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent2);"></div> Fase proyectada</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--success);opacity:.85;"></div> Avance real</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--danger);width:3px;border-radius:0;"></div> Hoy</div>
    <div class="legend-item" id="tab-desc" style="font-style:italic;color:var(--text2);font-size:11px;">Basado en horas estimadas de cada fase</div>
  </div>

  <div class="gantt-outer">
    <div id="stats-mini" class="stats-mini"></div>
    <div id="gantt-container"><div class="loading-text"><span class="spinner"></span>Cargando datos...</div></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tt-title"></div>
  <div class="tooltip-row"><span>Inicio:</span><span id="tt-inicio"></span></div>
  <div class="tooltip-row"><span>Fin:</span><span id="tt-fin"></span></div>
  <div class="tooltip-row"><span>Horas est.:</span><span id="tt-horas"></span></div>
  <div class="tooltip-row"><span>Avance:</span><span id="tt-avance"></span></div>
  <div class="pct-mini"><div class="pct-mini-fill" id="tt-bar"></div></div>
</div>

<script>
const API_PROYECTOS = 'https://primary-production-420b7.up.railway.app/webhook/proyectos';
const API_FASES = 'https://primary-production-420b7.up.railway.app/webhook/proyecto-fases';
const TIPO_LABELS = {externo:'Externo',interno:'Interno',desarrollo_producto:'Desarrollo',licitacion:'Licitación',edicion_planos:'Ed. Planos',otros:'Otros'};
const TIPO_COLORS = {externo:'#818cf8',interno:'#6ee7b7',desarrollo_producto:'#fbbf24',licitacion:'#f87171',edicion_planos:'#c4b5fd',otros:'#8888a0'};
const HORAS_DIA = 8.75;

let allData = [];
let currentTab = 'estimado';

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-estimado').classList.toggle('active-tab', tab==='estimado');
  document.getElementById('tab-capacidad').classList.toggle('active-tab', tab==='capacidad');
  document.getElementById('tab-desc').textContent = tab==='estimado'
    ? 'Basado en horas estimadas de cada fase'
    : 'Basado en capacidad de ingenieros asignados (8.75h/día)';
  renderGantt();
}

function parseDate(str) {
  if(!str) return new Date();
  if(str instanceof Date) return str;
  const s = String(str).split('T')[0];
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function addDiasHabiles(fecha, n) {
  const d = new Date(fecha);
  let added = 0;
  while(added < n) {
    d.setDate(d.getDate()+1);
    if(d.getDay()!==0 && d.getDay()!==6) added++;
  }
  return d;
}

function diasHabilesEntre(start, end) {
  const s = new Date(start); s.setHours(0,0,0,0);
  const e = new Date(end); e.setHours(0,0,0,0);
  if(e<=s) return 0;
  let count = 0;
  const cur = new Date(s);
  while(cur < e) {
    cur.setDate(cur.getDate()+1);
    if(cur.getDay()!==0 && cur.getDay()!==6) count++;
  }
  return count;
}

function calcularFechasFases(fases, fechaInicioProyecto, ingenieros) {
  const ings = Math.max(parseInt(ingenieros)||1, 1);
  let cursor = parseDate(fechaInicioProyecto);
  while(cursor.getDay()===0||cursor.getDay()===6) cursor.setDate(cursor.getDate()+1);
  return fases.map(f => {
    const horasEst = parseFloat(f.horas_estimadas)||0;
    const horasReal = parseFloat(f.horas_reales)||0;
    const inicio = new Date(cursor);
    const durDias = horasEst > 0
      ? Math.ceil(horasEst / (HORAS_DIA * (currentTab==='capacidad' ? ings : 1)))
      : 5;
    const fin = addDiasHabiles(inicio, durDias);
    cursor = new Date(fin);
    cursor.setDate(cursor.getDate()+1);
    while(cursor.getDay()===0||cursor.getDay()===6) cursor.setDate(cursor.getDate()+1);
    const pct = horasEst > 0 ? Math.min(Math.round(horasReal/horasEst*100),100) : 0;
    return {...f, _inicio: inicio, _fin: fin, _durDias: durDias, _pct: pct};
  });
}

function formatFecha(d) {
  return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'2-digit'});
}
function formatFechaCorta(d) {
  return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'});
}

async function recargar() {
  document.getElementById('gantt-container').innerHTML = '<div class="loading-text"><span class="spinner"></span>Cargando datos...</div>';
  allData = [];
  try {
    const resP = await fetch(API_PROYECTOS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion:'listar'})});
    const rawP = await resP.json();
    const proyectos = Array.isArray(rawP) ? rawP : (rawP.data ? [].concat(rawP.data) : []);

    // Poblar filtros dinámicos con valores únicos de la BD
    const estados = [...new Set(proyectos.map(p=>p.estado).filter(Boolean))].sort();
    const areas = [...new Set(proyectos.map(p=>p.departamento_solicitante).filter(Boolean))].sort();

    const selEstado = document.getElementById('filtro-estado');
    const selArea = document.getElementById('filtro-area');
    const ESTADO_LABELS = {en_curso:'En curso',completado:'Completado',cancelado:'Cancelado',pausado:'Pausado',cotizacion:'Cotización'};

    selEstado.innerHTML = '<option value="todos">Todos los estados</option>' +
      estados.map(e => `<option value="${e}" ${e==='en_curso'?'selected':''}>${ESTADO_LABELS[e]||e}</option>`).join('');
    const AREA_LABELS = {comercial:'Comercial',ingenieria:'Ingeniería propia',fabricacion:'Fabricación',interno:'Interno'};
    selArea.innerHTML = '<option value="todos">Todas las áreas</option>' +
      areas.map(a => `<option value="${a}">${AREA_LABELS[a]||a.charAt(0).toUpperCase()+a.slice(1)}</option>`).join('');

    const promises = proyectos.map(async p => {
      try {
        const resF = await fetch(API_FASES,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion:'listar',proyecto_id:p.id})});
        const rawF = await resF.json();
        const fases = Array.isArray(rawF) ? rawF : (rawF.data ? [].concat(rawF.data) : []);
        return {proyecto:p, fases};
      } catch(e) { return {proyecto:p, fases:[]}; }
    });
    allData = await Promise.all(promises);
  } catch(e) {
    document.getElementById('gantt-container').innerHTML = '<div class="loading-text">Error al cargar datos.</div>';
    return;
  }
  renderGantt();
}

function renderGantt() {
  const estado = document.getElementById('filtro-estado').value;
  const tipo   = document.getElementById('filtro-tipo').value;
  const area   = document.getElementById('filtro-area').value;
  const vista  = document.getElementById('filtro-vista').value;
  const escala = document.getElementById('filtro-escala').value;

  const datos = allData.filter(d => {
    if(estado!=='todos' && d.proyecto.estado!==estado) return false;
    if(tipo!=='todos'   && d.proyecto.tipo_proyecto!==tipo) return false;
    if(area!=='todos'   && d.proyecto.departamento_solicitante!==area) return false;
    return true;
  });

  if(!datos.length) {
    document.getElementById('gantt-container').innerHTML = '<div class="empty-state">No hay proyectos con los filtros seleccionados</div>';
    document.getElementById('stats-mini').innerHTML = '';
    return;
  }

  const proyConFechas = datos.map(d => {
    const p = d.proyecto;
    const fechaInicio = parseDate(p.fecha_inicio);
    const ings = parseInt(p.ingenieros_asignados)||1;
    const fases = calcularFechasFases(d.fases, fechaInicio, ings);
    const fechaFin = fases.length ? fases[fases.length-1]._fin : fechaInicio;
    return {proyecto:p, fases, fechaInicio, fechaFin};
  });

  // Hoy en Colombia
  const nowCo = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Bogota'}));
  const today = new Date(nowCo.getFullYear(), nowCo.getMonth(), nowCo.getDate());

  // Rango global
  let minDate = new Date(Math.min(...proyConFechas.map(d=>d.fechaInicio)));
  let maxDate = new Date(Math.max(...proyConFechas.map(d=>d.fechaFin)));
  minDate.setDate(minDate.getDate()-5);
  maxDate.setDate(maxDate.getDate()+14);

  // Píxeles por día hábil
  const PX = escala==='semanas' ? 26 : 11;

  // baseDate
  let baseDate;
  if(escala==='semanas') {
    baseDate = new Date(minDate);
    while(baseDate.getDay()!==1) baseDate.setDate(baseDate.getDate()-1);
  } else {
    baseDate = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  }
  baseDate.setHours(0,0,0,0);

  // Conversión fecha → X (días hábiles desde baseDate × PX)
  function toX(date) {
    const d = date instanceof Date ? new Date(date) : parseDate(date);
    d.setHours(0,0,0,0);
    if(d <= baseDate) return 0;
    return diasHabilesEntre(baseDate, d) * PX;
  }
  function toW(start, end) {
    return Math.max(6, toX(end) - toX(start));
  }

  // Columnas del header — generadas usando EXACTAMENTE toX para su posición
  const cols = [];
  if(escala==='semanas') {
    let cur = new Date(baseDate);
    while(cur <= maxDate) {
      const next = new Date(cur); next.setDate(next.getDate()+7);
      const finLabel = new Date(cur); finLabel.setDate(finLabel.getDate()+6);
      cols.push({
        x: toX(cur),
        width: diasHabilesEntre(cur, next) * PX,
        label: formatFechaCorta(cur)+' – '+formatFechaCorta(finLabel)
      });
      cur = next;
    }
  } else {
    let cur = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
    while(cur <= maxDate) {
      const next = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
      cols.push({
        x: toX(cur),
        width: diasHabilesEntre(cur, next) * PX,
        label: cur.toLocaleDateString('es-CO',{month:'short',year:'2-digit'})
      });
      cur = next;
    }
  }

  const totalWidth = cols.length ? (cols[cols.length-1].x + cols[cols.length-1].width + 40) : 800;
  const todayX = toX(today);

  // Stats
  const totalHorasEst  = proyConFechas.reduce((s,d)=>s+d.fases.reduce((ss,f)=>ss+(parseFloat(f.horas_estimadas)||0),0),0);
  const totalHorasReal = proyConFechas.reduce((s,d)=>s+d.fases.reduce((ss,f)=>ss+(parseFloat(f.horas_reales)||0),0),0);
  const avanceGlobal   = totalHorasEst>0 ? Math.round(totalHorasReal/totalHorasEst*100) : 0;

  document.getElementById('stats-mini').innerHTML = `
    <div class="stat-mini-item">Proyectos: <strong>${proyConFechas.length}</strong></div>
    <div class="stat-mini-item">Fases totales: <strong>${proyConFechas.reduce((s,d)=>s+d.fases.length,0)}</strong></div>
    <div class="stat-mini-item">Horas estimadas: <strong>${totalHorasEst.toFixed(0)}h</strong></div>
    <div class="stat-mini-item">Horas ejecutadas: <strong>${totalHorasReal.toFixed(1)}h</strong></div>
    <div class="stat-mini-item">Avance global: <strong style="color:var(--accent);">${avanceGlobal}%</strong></div>
    ${currentTab==='capacidad'?'<div class="stat-mini-item" style="color:var(--accent2);">⚡ Ajustado por ingenieros asignados</div>':''}
  `;

  // Separadores de columna (reutilizados en todas las filas)
  const colSeps = cols.map(c=>`<div class="col-sep" style="left:${c.x}px;"></div>`).join('');
  const todayEl = `<div class="today-line" style="left:${todayX}px;"></div>`;

  // Construir HTML de las dos columnas
  let leftHTML  = `<div class="gantt-left-header">Proyecto / Fase</div>`;
  let rightHTML  = `<div class="gantt-time-header" style="width:${totalWidth}px;">`;
  rightHTML += cols.map(c=>`<div class="gantt-col-label" style="left:${c.x}px;width:${c.width}px;">${c.label}</div>`).join('');
  rightHTML += `</div>`;

  proyConFechas.forEach(({proyecto:p, fases}) => {
    const color     = TIPO_COLORS[p.tipo_proyecto]||'#8888a0';
    const tipoLabel = TIPO_LABELS[p.tipo_proyecto]||p.tipo_proyecto||'—';
    const badgeClass  = `badge-${p.tipo_proyecto||'otros'}`;
    const estadoClass = `estado-${p.estado}`;
    const ESTADO_LABELS = {en_curso:'En curso',completado:'Completado',cancelado:'Cancelado',pausado:'Pausado',cotizacion:'Cotización'};

    if(vista === 'consolidado') {
      // Vista consolidada: una sola barra por proyecto (inicio primera fase → fin última fase)
      const primerFase = fases[0];
      const ultimaFase = fases[fases.length-1];
      if(!primerFase) return;
      const xP  = toX(primerFase._inicio);
      const wP  = toW(primerFase._inicio, ultimaFase._fin);
      const horasEstTotal  = fases.reduce((s,f)=>s+(parseFloat(f.horas_estimadas)||0),0);
      const horasRealTotal = fases.reduce((s,f)=>s+(parseFloat(f.horas_reales)||0),0);
      const pctP = horasEstTotal>0 ? Math.min(Math.round(horasRealTotal/horasEstTotal*100),100) : 0;
      const wRealP = horasEstTotal>0 ? Math.min(wP*(horasRealTotal/horasEstTotal), wP) : 0;
      const barColorP = pctP>=100?'#4ade80':pctP>=75?'#fbbf24':color;
      const rowH = 44;

      leftHTML += `<div class="gantt-project-info" style="min-height:${rowH}px;">
        <div style="width:4px;height:30px;border-radius:2px;background:${color};flex-shrink:0;"></div>
        <div style="overflow:hidden;min-width:0;">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
            <span class="project-label">${p.nombre}</span>
            <span class="badge-tipo ${badgeClass}">${tipoLabel}</span>
            <span class="estado-badge ${estadoClass}">${ESTADO_LABELS[p.estado]||p.estado||''}</span>
          </div>
          <div class="project-meta">${horasEstTotal}h est. · ${pctP}% avance · ${fases.length} fases</div>
        </div>
      </div>`;

      rightHTML += `<div class="gantt-fase-bar-row" style="width:${totalWidth}px;min-height:${rowH}px;">
        ${colSeps}${todayEl}
        <div class="gantt-bar" style="left:${xP}px;width:${wP}px;top:10px;height:24px;background:${barColorP};opacity:.87;"
          onmouseenter="showTooltip(event,'${p.nombre}','${formatFecha(primerFase._inicio)}','${formatFecha(ultimaFase._fin)}','${horasEstTotal}','${pctP}')"
          onmouseleave="hideTooltip()" onmousemove="moveTooltip(event)">
          ${wP>80?p.nombre:''}
        </div>
        ${wRealP>0?`<div class="gantt-bar-real" style="left:${xP}px;width:${wRealP}px;top:10px;height:24px;background:#4ade80;"></div>`:''}
      </div>`;

    } else {
      // Vista por proyectos: desglose de fases
      const projRowH = 40;
      leftHTML += `<div class="gantt-project-info" style="min-height:${projRowH}px;">
        <div style="width:4px;height:26px;border-radius:2px;background:${color};flex-shrink:0;"></div>
        <div style="overflow:hidden;min-width:0;">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
            <span class="project-label">${p.nombre}</span>
            <span class="badge-tipo ${badgeClass}">${tipoLabel}</span>
            <span class="estado-badge ${estadoClass}">${ESTADO_LABELS[p.estado]||p.estado||''}</span>
          </div>
          <div class="project-meta">
            ${fases.length} fases${fases.length?' · hasta '+formatFechaCorta(fases[fases.length-1]._fin):''}
          </div>
        </div>
      </div>`;

      rightHTML += `<div class="gantt-project-bar-row" style="min-height:${projRowH}px;width:${totalWidth}px;">${colSeps}${todayEl}</div>`;

      fases.forEach(f => {
        const horasEst  = parseFloat(f.horas_estimadas)||0;
        const horasReal = parseFloat(f.horas_reales)||0;
        const x  = toX(f._inicio);
        const w  = toW(f._inicio, f._fin);
        const wReal = horasEst>0 ? Math.min(w*(horasReal/horasEst), w) : 0;
        const pct = f._pct;
        const barColor = pct>=100?'#4ade80':pct>=75?'#fbbf24':color;

        leftHTML += `<div class="gantt-fase-info">
          <div class="fase-nombre">${f.orden||''} ${f.nombre}</div>
          <div class="fase-horas">${horasEst>0?horasEst+'h est.':'Sin horas'} ${horasReal>0?'· '+horasReal+'h real':''} · ${f._durDias}d</div>
        </div>`;

        rightHTML += `<div class="gantt-fase-bar-row" style="width:${totalWidth}px;">
          ${colSeps}${todayEl}
          <div class="gantt-bar" style="left:${x}px;width:${w}px;background:${barColor};opacity:.87;"
            onmouseenter="showTooltip(event,'${f.nombre}','${formatFecha(f._inicio)}','${formatFecha(f._fin)}','${horasEst}','${pct}')"
            onmouseleave="hideTooltip()" onmousemove="moveTooltip(event)">
            ${w>50?(horasEst>0?horasEst+'h':''):''}
          </div>
          ${wReal>0?`<div class="gantt-bar-real" style="left:${x}px;width:${wReal}px;background:#4ade80;"></div>`:''}
        </div>`;
      });
    }
  });

  document.getElementById('gantt-container').innerHTML = `
    <div class="gantt-layout">
      <div class="gantt-left">${leftHTML}</div>
      <div class="gantt-right">
        <div class="gantt-right-inner" style="width:${totalWidth}px;">${rightHTML}</div>
      </div>
    </div>`;
}

function showTooltip(e, nombre, inicio, fin, horas, pct) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-title').textContent = nombre;
  document.getElementById('tt-inicio').textContent = inicio;
  document.getElementById('tt-fin').textContent = fin;
  document.getElementById('tt-horas').textContent = horas>0?horas+'h':'Sin estimar';
  document.getElementById('tt-avance').textContent = pct+'%';
  document.getElementById('tt-bar').style.width = pct+'%';
  const p2 = parseInt(pct);
  document.getElementById('tt-bar').style.background = p2>=100?'#4ade80':p2>=75?'#fbbf24':'#818cf8';
  tt.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX+14, y = e.clientY-10;
  if(x+230>window.innerWidth) x = e.clientX-244;
  tt.style.left = x+'px'; tt.style.top = y+'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display='none'; }

recargar();
</script>
</body>
</html>
