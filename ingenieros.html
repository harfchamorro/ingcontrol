<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Ingenieros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0f11;--surface:#1a1a1f;--surface2:#222228;--border:#2e2e38;--accent:#6ee7b7;--accent2:#818cf8;--text:#f1f1f3;--text2:#8888a0;--danger:#f87171;--warning:#fbbf24;--radius:10px; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
  .logo{font-size:15px;font-weight:600;color:var(--accent);}
  .logo span{color:var(--text2);font-weight:400;}
  .container{max-width:1100px;margin:0 auto;padding:32px 24px;}
  .page-title{font-size:22px;font-weight:600;margin-bottom:4px;}
  .page-sub{font-size:14px;color:var(--text2);margin-bottom:28px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
  .stat-label{font-size:12px;color:var(--text2);margin-bottom:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
  .stat-value{font-size:26px;font-weight:600;}
  .stat-value.green{color:var(--accent);}
  .stat-value.purple{color:var(--accent2);}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .search-wrap{position:relative;}
  .search-wrap input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px 9px 36px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;width:260px;outline:none;}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius);font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
  .btn-primary{background:var(--accent);color:#0f2419;}
  .btn-primary:hover{background:#4fd4a0;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
  .btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:6px 12px;font-size:13px;}
  .btn-edit{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 12px;font-size:13px;}
  .btn-edit:hover{border-color:var(--accent2);color:var(--accent2);}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{padding:12px 16px;text-align:left;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:400;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--surface2);}
  tbody td{padding:14px 16px;font-size:14px;}
  .avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-right:10px;flex-shrink:0;}
  .name-cell{display:flex;align-items:center;}
  .name-text{font-weight:500;}
  .email-text{font-size:12px;color:var(--text2);}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;}
  .badge-active{background:rgba(110,231,183,.12);color:var(--accent);}
  .mono{font-family:'DM Mono',monospace;font-size:13px;}
  .actions{display:flex;gap:6px;}
  .empty{text-align:center;padding:48px;color:var(--text2);font-size:14px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:480px;padding:28px;}
  .modal-title{font-size:18px;font-weight:600;margin-bottom:20px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;}
  input,select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;width:100%;}
  input:focus,select:focus{border-color:var(--accent2);}
  select option{background:#1a1a1f;color:var(--text);}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:14px;z-index:200;display:none;align-items:center;gap:10px;}
  .toast.show{display:flex;}
  .toast.success{border-color:var(--accent);color:var(--accent);}
  .toast.error{border-color:var(--danger);color:var(--danger);}
  .loading{text-align:center;padding:40px;color:var(--text2);font-size:14px;}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .av-0{background:rgba(110,231,183,.15);color:var(--accent);}
  .av-1{background:rgba(129,140,248,.15);color:var(--accent2);}
  .av-2{background:rgba(251,191,36,.15);color:var(--warning);}
  .av-3{background:rgba(248,113,113,.15);color:var(--danger);}
  .av-4{background:rgba(167,139,250,.15);color:#c4b5fd;}
</style>
</head>
<body>
<header>
  <div class="logo">Ing<span>Control</span> · <span>Ingenieros</span></div>
  <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo ingeniero</button>
</header>
<div class="container">
  <div class="page-title">Gestión de ingenieros</div>
  <div class="page-sub">Administra el equipo del departamento de ingeniería</div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total ingenieros</div><div class="stat-value green" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Horas contrato/mes</div><div class="stat-value purple" id="stat-horas">—</div></div>
    <div class="stat-card"><div class="stat-label">Costo promedio/hora</div><div class="stat-value" id="stat-costo">—</div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="buscar" placeholder="Buscar ingeniero..." oninput="filtrar()">
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Ingeniero</th><th>Cargo</th><th>Horas/día</th><th>Costo/hora</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody id="tabla-body"><tr><td colspan="6" class="loading"><span class="spinner"></span>Cargando...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nuevo ingeniero</div>
    <div class="form-grid">
      <div class="form-group"><label>Nombre</label><input type="text" id="f-nombre" placeholder="Juan"></div>
      <div class="form-group"><label>Apellido</label><input type="text" id="f-apellido" placeholder="Pérez"></div>
      <div class="form-group full"><label>Email</label><input type="email" id="f-email" placeholder="juan@empresa.com"></div>
      <div class="form-group full">
        <label>Cargo</label>
        <select id="f-cargo">
          <option value="">Seleccionar cargo...</option>
          <option value="Director de ingeniería">Director de ingeniería</option>
          <option value="Coordinador de ingeniería">Coordinador de ingeniería</option>
          <option value="Ingeniero 1">Ingeniero 1</option>
          <option value="Ingeniero 2">Ingeniero 2</option>
          <option value="Dibujante">Dibujante</option>
        </select>
      </div>
      <div class="form-group"><label>Horas/día contrato</label><input type="number" id="f-horas" value="8.75" step="0.25" min="1" max="12"></div>
      <div class="form-group"><label>Costo por hora ($)</label><input type="number" id="f-costo" placeholder="50000" min="0"></div>
      <div class="form-group"><label>Fecha ingreso</label><input type="date" id="f-fecha"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://primary-production-420b7.up.railway.app/webhook/ingenieros';
let ingenieros = [], editandoId = null;
const colores = ['av-0','av-1','av-2','av-3','av-4'];

async function llamarAPI(accion, datos={}) {
  const res = await fetch(API, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({accion,...datos})
  });
  if(!res.ok) throw new Error('Error '+res.status);
  return res.json();
}

function iniciales(n,a){return((n||'')[0]||'')+((a||'')[0]||'');}
function formatCOP(n){return '$'+Number(n||0).toLocaleString('es-CO');}

async function cargar(){
  try{
    const data = await llamarAPI('listar');
    ingenieros = Array.isArray(data)?data:(data.data?[].concat(data.data):[]);
    renderTabla(ingenieros);
    actualizarStats();
  }catch(e){
    document.getElementById('tabla-body').innerHTML='<tr><td colspan="6" class="empty">Error al conectar. Verifica que N8N esté activo.</td></tr>';
  }
}

function actualizarStats(){
  const a=ingenieros.filter(i=>i.activo==1);
  document.getElementById('stat-total').textContent=a.length;
  document.getElementById('stat-horas').textContent=Math.round(a.reduce((s,i)=>s+(parseFloat(i.horas_contrato)||8.75)*22,0))+'h';
  const p=a.length?a.reduce((s,i)=>s+(parseFloat(i.costo_hora)||0),0)/a.length:0;
  document.getElementById('stat-costo').textContent=formatCOP(Math.round(p));
}

function renderTabla(lista){
  const tbody=document.getElementById('tabla-body');
  const a=lista.filter(i=>i.activo==1);
  if(!a.length){tbody.innerHTML='<tr><td colspan="6" class="empty">No hay ingenieros. Crea el primero.</td></tr>';return;}
  tbody.innerHTML=a.map((ing,idx)=>`
    <tr>
      <td><div class="name-cell"><div class="avatar ${colores[idx%5]}">${iniciales(ing.nombre,ing.apellido)}</div><div><div class="name-text">${ing.nombre} ${ing.apellido}</div><div class="email-text">${ing.email}</div></div></div></td>
      <td>${ing.cargo||'—'}</td>
      <td class="mono">${ing.horas_contrato||8.75}h</td>
      <td class="mono">${formatCOP(ing.costo_hora||0)}</td>
      <td><span class="badge badge-active">Activo</span></td>
      <td><div class="actions"><button class="btn btn-edit" onclick="editar(${ing.id})">Editar</button><button class="btn btn-danger" onclick="eliminar(${ing.id})">Eliminar</button></div></td>
    </tr>`).join('');
}

function filtrar(){
  const q=document.getElementById('buscar').value.toLowerCase();
  renderTabla(ingenieros.filter(i=>(i.nombre+' '+i.apellido+' '+(i.cargo||'')+' '+i.email).toLowerCase().includes(q)));
}

function abrirModal(id=null){
  editandoId=id;
  document.getElementById('modal-title').textContent=id?'Editar ingeniero':'Nuevo ingeniero';
  if(id){
    const ing=ingenieros.find(i=>i.id==id);
    document.getElementById('f-nombre').value=ing.nombre||'';
    document.getElementById('f-apellido').value=ing.apellido||'';
    document.getElementById('f-email').value=ing.email||'';
    document.getElementById('f-cargo').value=ing.cargo||'';
    document.getElementById('f-horas').value=ing.horas_contrato||8.75;
    document.getElementById('f-costo').value=ing.costo_hora||'';
    document.getElementById('f-fecha').value=ing.fecha_ingreso?ing.fecha_ingreso.split('T')[0]:'';
  }else{
    ['f-nombre','f-apellido','f-email','f-costo','f-fecha'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-cargo').value='';
    document.getElementById('f-horas').value=8.75;
  }
  document.getElementById('modal').classList.add('open');
}

function cerrarModal(){document.getElementById('modal').classList.remove('open');editandoId=null;}
function editar(id){abrirModal(id);}

async function eliminar(id){
  if(!confirm('¿Eliminar este ingeniero?'))return;
  try{await llamarAPI('eliminar',{id});toast('Eliminado','success');cargar();}
  catch(e){toast('Error al eliminar','error');}
}

async function guardar(){
  const datos={
    nombre:document.getElementById('f-nombre').value.trim(),
    apellido:document.getElementById('f-apellido').value.trim(),
    email:document.getElementById('f-email').value.trim(),
    cargo:document.getElementById('f-cargo').value,
    horas_contrato:parseFloat(document.getElementById('f-horas').value),
    costo_hora:parseFloat(document.getElementById('f-costo').value)||0,
    fecha_ingreso:document.getElementById('f-fecha').value||null
  };
  if(!datos.nombre||!datos.apellido||!datos.email){toast('Nombre, apellido y email son obligatorios','error');return;}
  try{
    if(editandoId){await llamarAPI('actualizar',{id:editandoId,...datos});toast('Actualizado','success');}
    else{await llamarAPI('crear',datos);toast('Ingeniero creado','success');}
    cerrarModal();cargar();
  }catch(e){toast('Error al guardar','error');}
}

function toast(msg,tipo='success'){
  const t=document.getElementById('toast');
  t.textContent=(tipo==='success'?'✓ ':'✗ ')+msg;
  t.className='toast show '+tipo;
  setTimeout(()=>t.className='toast',3000);
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))cerrarModal();});
cargar();
</script>
</body>
</html>
